# Prefix
unbind C-b
set -g prefix '`'
bind '`' send-prefix

# Reload config
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded."

# Split panes
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Cycle through panes
set -g repeat-time 500
bind -r p select-pane -t :.+
bind -r P select-pane -t :.-

# Pane index
set -g base-index 1
setw -g pane-base-index 1

bind -r h previous-window
bind -r j switch-client -n
bind -r k switch-client -p
bind -r l next-window

# Navigating panes
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# History
set -g history-limit 100000

# Pane seperation colors
set -g pane-active-border-style 'fg=colour243'
set -g pane-border-style 'fg=colour236'

# Brighter text for active window pane
set -g window-style 'fg=colour245'
set -g window-active-style 'fg=colour252'

# Add padding to window names, and visual flag for window activity
set -g window-status-format ' #W#{?window_activity_flag,!,} '
set -g window-status-separator ''

# Default gray on gray status bar style
set -g status-style bg=colour236,fg=colour248

# Inactive window labels match the color of the status bar
setw -g window-status-style bg=colour236,fg=colour248

# Active window label is slightly highlighted
setw -g window-status-current-style bg=colour24,fg=colour14
setw -g window-status-current-style bg=colour239,fg=colour251
set -g window-status-current-format ' #W#{?window_zoomed_flag,-Z,} '

# Left status
set -g status-left "#[bg=colour239,fg=colour252]"

# Right status
set -g status-right "#[bg=colour238,fg=colour244] %b %d %H:%M "